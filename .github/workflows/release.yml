name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: >
          pyinstaller
          --onefile
          --windowed
          --name GregMiner
          --icon build/icon.ico
          gregminer.py

      - name: Zip EXE
        run: Compress-Archive -Path dist\GregMiner.exe -DestinationPath dist\GregMiner-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/GregMiner-Windows.zip

  build-macos-native:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: brew install libevent pkg-config create-dmg

      - name: Build gregcoind from source
        run: |
          git clone --depth 1 https://github.com/chartractegg/gregcoin.git /tmp/gregcoin
          cd /tmp/gregcoin
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=OFF \
            -DBUILD_TX=OFF \
            -DBUILD_UTIL=OFF \
            -DBUILD_WALLET_TOOL=OFF \
            -DBUILD_BENCH=OFF \
            -DBUILD_KERNEL_LIB=OFF \
            -DBUILD_GUI=OFF \
            -DENABLE_IPC=OFF \
            -DWITH_ZMQ=OFF \
            -DWITH_USDT=OFF \
            -DCMAKE_PREFIX_PATH="$(brew --prefix)"
          cmake --build build -j$(sysctl -n hw.ncpu)
          cp build/bin/gregcoind /tmp/gregcoind
          chmod +x /tmp/gregcoind
          echo "Built: $(file /tmp/gregcoind)"

      - name: Build native macOS app + DMG
        run: |
          cd GregMiner-macOS
          chmod +x scripts/build-dmg.sh
          ./scripts/build-dmg.sh --gregcoind-bin /tmp/gregcoind

      - uses: actions/upload-artifact@v4
        with:
          name: macos-native-build
          path: GregMiner-macOS/dist/GregMiner-macOS.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          sudo apt-get install -y python3-tk
          pip install pyinstaller

      - name: Build binary
        run: >
          pyinstaller
          --onefile
          --name GregMiner
          gregminer.py

      - name: Tar binary
        run: tar -czf dist/GregMiner-Linux.tar.gz -C dist GregMiner

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/GregMiner-Linux.tar.gz

  release:
    needs: [build-windows, build-macos-native, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GregMiner ${{ github.ref_name }}"
          body: |
            ## GregMiner ${{ github.ref_name }}

            ### macOS — Download and go
            **`GregMiner-macOS.dmg`** is a standalone app. Open the DMG, drag to Applications, double-click. That's it.

            Everything is built in — wallet, full node, and CPU miner. No setup required.

            If macOS says "unidentified developer": right-click the app → Open → Open.

            | Feature | |
            |---------|---|
            | Wallet | Send & receive GRC |
            | Full Node | Built-in gregcoind starts automatically |
            | CPU Miner | One-click mining with live hashrate |
            | Dashboard | Balance, node status, network info |

            ### Windows / Linux
            These use the Python/tkinter GUI and connect to a separate gregcoind node.

            | Platform | Download |
            |----------|----------|
            | macOS | `GregMiner-macOS.dmg` — standalone, just works |
            | Windows | `GregMiner-Windows.zip` → extract and run `GregMiner.exe` |
            | Linux | `GregMiner-Linux.tar.gz` → extract and run `./GregMiner` |

            Windows/Linux users: download Gregcoin Core from [chartractegg/gregcoin](https://github.com/chartractegg/gregcoin).
          files: |
            artifacts/macos-native-build/GregMiner-macOS.dmg
            artifacts/windows-build/GregMiner-Windows.zip
            artifacts/linux-build/GregMiner-Linux.tar.gz
          draft: false
          prerelease: false
